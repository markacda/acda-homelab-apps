# Aggregates all homelab apps. Each app gets its own port starting at 6000, and
# an nginx `proxy` service fronts them all: HTTPS on host 443 (self-signed cert,
# HTTP on 80 redirects to it), routing by path (e.g. <ip>/atc, <ip>/receptenboek,
# dashboard at <ip>/). The per-app 600x ports stay published for direct access.
# To add an app: create apps/<name> with a Dockerfile, add a service below on the
# next free port, and add an nginx `location` block in proxy/nginx.conf.
services:
  # Reverse proxy: the single public entrypoint on 80/443. See proxy/nginx.conf.
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    container_name: proxy
    labels:
      # Don't auto-list the proxy itself as a dashboard tile.
      - 'homelab.enable=false'
    ports:
      - '80:80'
      - '443:443'
    environment:
      # subjectAltName for the self-signed cert generated on first boot. Add the
      # Pi's LAN IP/hostname here (e.g. ,IP:192.168.1.50) so the cert names it.
      - TLS_SAN=DNS:localhost,IP:127.0.0.1
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy/proxy_common:/etc/nginx/proxy_common:ro
      # Persistent self-signed cert (generated on first boot, reused after).
      - proxy-certs:/etc/nginx/certs
    depends_on:
      - dashboard
      - atc
      - ev-crossover
      - dynamic-vs-fixed
      - recipe-book
      - log-viewer
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/nginx-health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  atc:
    build:
      context: .
      dockerfile: apps/atc/Dockerfile
    container_name: atc-frontend
    labels:
      - 'homelab.name=ATC'
      - 'homelab.icon=✈️'
    ports:
      # Host 6001 avoids Home Assistant's used ports (80/443 proxy, 8123, 1883, 4357)
      - '6001:6001'
    environment:
      - NODE_ENV=production
      - PORT=6001
      - LOG_DIR=/app/logs
    volumes:
      - atc-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:6001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ev-crossover:
    build:
      context: .
      dockerfile: apps/ev-crossover/Dockerfile
    container_name: ev-crossover
    labels:
      - 'homelab.name=Laden of tanken?'
      - 'homelab.icon=🔌'
    ports:
      - '6002:6002'
    environment:
      - NODE_ENV=production
      - PORT=6002
      - LOG_DIR=/app/logs
    volumes:
      - ev-crossover-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:6002/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dynamic-vs-fixed:
    build:
      context: .
      dockerfile: apps/dynamic-vs-fixed/Dockerfile
    container_name: dynamic-vs-fixed
    labels:
      - 'homelab.name=Dynamisch of vast contract?'
      - 'homelab.icon=⚡'
    ports:
      - '6003:6003'
    environment:
      - NODE_ENV=production
      - PORT=6003
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
    volumes:
      - dynamic-vs-fixed-data:/app/data
      - dynamic-vs-fixed-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:6003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  log-viewer:
    build:
      context: .
      dockerfile: apps/log-viewer/Dockerfile
    container_name: log-viewer
    labels:
      - 'homelab.name=Logs'
      - 'homelab.icon=🪲'
    ports:
      - '6004:6004'
    environment:
      - NODE_ENV=production
      - PORT=6004
      - LOG_DIR=/app/logs
      # Every app's log volume is mounted read-only under here, one subdir each.
      - LOGS_ROOT=/logs
    volumes:
      # Read-only mounts of every app's access-log volume (incl. its own), so
      # the viewer can read the full daily-rotated, gzipped 1-month history.
      - atc-logs:/logs/atc:ro
      - ev-crossover-logs:/logs/ev-crossover:ro
      - dynamic-vs-fixed-logs:/logs/dynamic-vs-fixed:ro
      - dashboard-logs:/logs/dashboard:ro
      - recipe-book-logs:/logs/recipe-book:ro
      - log-viewer-logs:/logs/log-viewer:ro
      # Read-write target for this app's own access log.
      - log-viewer-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:6004/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  recipe-book:
    build:
      context: .
      dockerfile: apps/recipe-book/Dockerfile
    container_name: recipe-book
    labels:
      - 'homelab.name=Receptenboek'
      - 'homelab.icon=🍳'
    ports:
      - '6005:6005'
    environment:
      - NODE_ENV=production
      - PORT=6005
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      # Tectonic caches downloaded LaTeX support files here (on the data volume).
      - TECTONIC_CACHE_DIR=/app/data/.tectonic-cache
    volumes:
      # Persistent recipes, books, downloaded images, generated output + TeX cache.
      - recipe-book-data:/app/data
      - recipe-book-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:6005/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: dashboard
    labels:
      - 'homelab.name=Dashboard'
    ports:
      # The dashboard is the homelab landing page, reached at <ip>/ via the proxy.
      # It also stays directly reachable on 6000, in line with the 600x scheme.
      - '6000:6000'
    volumes:
      # Read-only Docker socket for auto-discovery of running containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Config (manual tiles + overrides), read-only inside the container.
      - ./apps/dashboard/config:/app/config:ro
      # Persistent structured access logs.
      - dashboard-logs:/app/logs
    extra_hosts:
      # Lets the container reach services published on the host by name,
      # used for server-side health checks.
      - 'host.docker.internal:host-gateway'
    environment:
      - NODE_ENV=production
      - HOST_ADDRESS=host.docker.internal
      - PORT=6000
      - LOG_DIR=/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:6000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  proxy-certs:
  dynamic-vs-fixed-data:
  recipe-book-data:
  atc-logs:
  ev-crossover-logs:
  dynamic-vs-fixed-logs:
  dashboard-logs:
  recipe-book-logs:
  log-viewer-logs:
