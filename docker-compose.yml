# Aggregates all homelab apps. Each app gets its own port starting at 6001.
# To add an app: create apps/<name> with a Dockerfile and add a new service
# below on the next free port.
services:
  atc:
    build:
      context: .
      dockerfile: apps/atc/Dockerfile
    container_name: atc-frontend
    labels:
      - "homelab.name=Aircraft Tracker"
    ports:
      # Host 6001 avoids Home Assistant's used ports (80/443 proxy, 8123, 1883, 4357)
      - "6001:6001"
    environment:
      - NODE_ENV=production
      - PORT=6001
      - LOG_DIR=/app/logs
    volumes:
      - atc-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:6001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ev-crossover:
    build:
      context: .
      dockerfile: apps/ev-crossover/Dockerfile
    container_name: ev-crossover
    labels:
      - "homelab.name=EV Crossover Price"
    ports:
      - "6002:6002"
    environment:
      - PORT=6002
      - LOG_DIR=/app/logs
    volumes:
      - ev-crossover-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:6002/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dynamic-vs-fixed:
    build:
      context: .
      dockerfile: apps/dynamic-vs-fixed/Dockerfile
    container_name: dynamic-vs-fixed
    labels:
      - "homelab.name=Dynamic vs Fixed Energy"
    ports:
      - "6003:6003"
    environment:
      - PORT=6003
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
    volumes:
      - dynamic-vs-fixed-data:/app/data
      - dynamic-vs-fixed-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:6003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: dashboard
    ports:
      # The dashboard is the homelab landing page, so it deliberately takes the
      # well-known web ports (80 + 443) plus 8080. The container listens on 8080;
      # every mapping points at it. Note: this overlaps Home Assistant's 80/443
      # proxy — run only one of them on these ports.
      - "80:8080"
      - "443:8080"
      - "8080:8080"
    volumes:
      # Read-only Docker socket for auto-discovery of running containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Config (manual tiles + overrides), read-only inside the container.
      - ./apps/dashboard/config:/app/config:ro
      # Persistent structured access logs.
      - dashboard-logs:/app/logs
    extra_hosts:
      # Lets the container reach services published on the host by name,
      # used for server-side health checks.
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - HOST_ADDRESS=host.docker.internal
      - PORT=8080
      - LOG_DIR=/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dynamic-vs-fixed-data:
  atc-logs:
  ev-crossover-logs:
  dynamic-vs-fixed-logs:
  dashboard-logs:
