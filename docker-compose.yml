# Aggregates all homelab apps. Each app gets its own port starting at 6002
# (6001 is already in use). To add an app: create apps/<name> with a Dockerfile
# and add a new service below on the next free port.
services:
  ev-crossover:
    build: ./apps/ev-crossover
    container_name: ev-crossover
    ports:
      - "6002:6002"
    environment:
      - PORT=6002
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:6002/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dynamic-vs-fixed:
    build: ./apps/dynamic-vs-fixed
    container_name: dynamic-vs-fixed
    ports:
      - "6003:6003"
    environment:
      - PORT=6003
      - DATA_DIR=/app/data
    volumes:
      - dynamic-vs-fixed-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:6003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dynamic-vs-fixed-data:
