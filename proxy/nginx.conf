# Reverse proxy for the homelab apps. Terminates TLS on 443 and routes by path,
# stripping the path prefix so each app still sees itself mounted at "/". Apps are
# reached by their Compose service name over the default compose network. The
# dashboard is the landing page at "/".
#
# Plain HTTP on 80 redirects to HTTPS (except /nginx-health, kept on HTTP so the
# container healthcheck needs no cert handling). The TLS cert is self-signed and
# generated on first boot (see proxy/generate-selfsigned-cert.sh) into the
# persistent /etc/nginx/certs volume.
#
# Each prefixed app uses a regex `location` that captures the path after its
# prefix and passes it (plus the query string) straight through in `proxy_pass`
# (`.../$1$is_args$args`), so each app still sees itself mounted at "/". This
# reconstruct-in-proxy_pass form is used instead of a `rewrite ... break` because,
# with a variable upstream (below), a bare `proxy_pass` does NOT carry the query
# string `$args` to the app — every `?foo=bar` was being dropped. Apps therefore
# need their client to use RELATIVE URLs (see the repo plan) so requests arrive
# under the prefix.
#
# Upstreams are addressed through the `set $upstream_x <service>;` + variable
# `proxy_pass` pattern together with Docker's embedded DNS `resolver`. This forces
# nginx to re-resolve each service name at request time instead of caching the IP
# once at startup — so recreating an app container (e.g. `docker compose up -d
# --build`) no longer leaves the proxy pointed at a dead IP (502). A static
# `proxy_pass http://atc:6001/` would strip the prefix for free but pins the IP
# at boot, which is exactly what broke routing after a rebuild.

# Structured access log for the Log Viewer. One JSON object per line, matching the
# @homelab/access-log `AccessLogEntry` shape (ts + numeric status is what the viewer
# keys on; `app` groups the source). Written to a file on the proxy-logs volume that
# log-viewer mounts read-only under /logs/proxy. `escape=json` escapes string values;
# numeric fields (status/bytes/durationMs) are left unquoted so they parse as numbers.
# NOTE: $request_time is in SECONDS (stock nginx can't emit ms), so proxy `durationMs`
# reads at seconds-scale in the viewer. $request_uri is the FULL pre-strip URI incl.
# the query string — the edge view the per-app logs can't show.
log_format logviewer escape=json
  '{'
  '"ts":"$time_iso8601",'
  '"app":"proxy",'
  '"method":"$request_method",'
  '"url":"$request_uri",'
  '"status":$status,'
  '"durationMs":$request_time,'
  '"ip":"$remote_addr",'
  '"ua":"$http_user_agent",'
  '"referer":"$http_referer",'
  '"bytes":$body_bytes_sent'
  '}';

# HTTP: healthcheck stays here; everything else is redirected to HTTPS.
server {
  listen 80;
  server_name _;

  # Cheap endpoint for the container healthcheck (plain HTTP, no redirect).
  # Polled every 30s — keep it out of the access log so it doesn't drown the feed.
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS: the actual app routing.
server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  # Persist a structured JSON access log for the Log Viewer, and keep the stock
  # combined log on stdout so `docker logs proxy` is unchanged.
  access_log /var/log/nginx/lv/access.log logviewer;
  access_log /dev/stdout combined;

  # Docker's embedded DNS. Used together with the variable `proxy_pass` below so
  # service names are re-resolved at request time (survives container recreation).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Recipe-book uploads images (multer, in-memory). Keep this generous.
  client_max_body_size 25m;

  location = /atc { return 301 /atc/; }
  location ~ ^/atc/(.*)$ {
    set $upstream_atc atc;
    proxy_pass http://$upstream_atc:6001/$1$is_args$args;
    include /etc/nginx/proxy_common;
  }

  location = /dynamisch-of-vast { return 301 /dynamisch-of-vast/; }
  location ~ ^/dynamisch-of-vast/(.*)$ {
    set $upstream_dvf dynamic-vs-fixed;
    proxy_pass http://$upstream_dvf:6003/$1$is_args$args;
    include /etc/nginx/proxy_common;
  }

  location = /laden-of-tanken { return 301 /laden-of-tanken/; }
  location ~ ^/laden-of-tanken/(.*)$ {
    set $upstream_ev ev-crossover;
    proxy_pass http://$upstream_ev:6002/$1$is_args$args;
    include /etc/nginx/proxy_common;
  }

  location = /receptenboek { return 301 /receptenboek/; }
  location ~ ^/receptenboek/(.*)$ {
    set $upstream_recipe recipe-book;
    proxy_pass http://$upstream_recipe:6005/$1$is_args$args;
    include /etc/nginx/proxy_common;
  }

  location = /logs { return 301 /logs/; }
  location ~ ^/logs/(.*)$ {
    set $upstream_logs log-viewer;
    proxy_pass http://$upstream_logs:6004/$1$is_args$args;
    include /etc/nginx/proxy_common;
  }

  location = /notificaties { return 301 /notificaties/; }
  location ~ ^/notificaties/(.*)$ {
    set $upstream_notif notification;
    proxy_pass http://$upstream_notif:6006/$1$is_args$args;
    include /etc/nginx/proxy_common;
  }

  # Everything else is the dashboard (served at the origin root). No prefix to
  # strip, so pass the URI through unchanged.
  location / {
    set $upstream_dashboard dashboard;
    proxy_pass http://$upstream_dashboard:6000;
    include /etc/nginx/proxy_common;
  }
}
